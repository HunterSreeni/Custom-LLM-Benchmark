category_id: 2
total_bugs: 14

bugs:
  # === Phase A: Recon and OSINT ===

  - id: "tech-fingerprint"
    phase: "a"
    difficulty: "easy"
    file: "fixtures/recon/http-headers.txt"
    line: 1
    description: "HTTP response headers reveal full tech stack - Go server, HTMX 1.9.10, SQLite 3.44.2, JWT session cookies"
    type: "information-disclosure"
    verification: "Headers contain Server: Go-HTTP-Server, X-Powered-By: htmx/1.9.10, X-SQLite-Version: 3.44.2, and JWT session cookie"

  - id: "endpoint-discovery"
    phase: "a"
    difficulty: "medium"
    file: "fixtures/recon/robots-txt.txt"
    line: 1
    description: "robots.txt exposes /admin/, /api/internal/, /debug/, /api/v2/ paths; JS bundle leaks API endpoints, WebSocket URL, and internal references"
    type: "information-disclosure"
    verification: "Cross-reference robots.txt disallowed paths with JS bundle string extractions to build complete endpoint map"

  - id: "subdomain-recon"
    phase: "a"
    difficulty: "hard"
    file: "fixtures/recon/http-headers.txt"
    line: 1
    description: "Test methodology knowledge for subdomain enumeration including cert transparency, DNS brute-force, WHOIS, and passive OSINT"
    type: "methodology"
    verification: "Response should mention crt.sh, subfinder/amass, DNS zone transfer, reverse DNS, Shodan, and GitHub dorking"

  - id: "attack-surface-map"
    phase: "a"
    difficulty: "difficult"
    file: "fixtures/recon/github-repo-readme.md"
    line: 1
    description: "Cross-referencing all recon data reveals default credentials in README (DB_PASSWORD=changeme_in_production, ADMIN_PASSWORD=admin123), SQL injection via error page, exposed debug endpoints"
    type: "compound-vulnerability"
    verification: "Must identify credentials from README, SQL injection from error page, and prioritize debug/internal endpoints"

  - id: "github-dorking"
    phase: "a"
    difficulty: "hidden"
    file: "fixtures/recon/github-repo-readme.md"
    line: 1
    description: "Public GitHub README contains default credentials in Quick Start section - DB_PASSWORD=changeme_in_production, JWT_SECRET=dev-secret-key-replace-in-prod, ADMIN_PASSWORD=admin123"
    type: "credential-exposure"
    verification: "README .env.example section contains DB_PASSWORD, JWT_SECRET, SESSION_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD in plaintext"

  # === Phase B: Exploitation ===

  - id: "error-page-disclosure"
    phase: "b"
    difficulty: "easy"
    file: "fixtures/recon/error-page.html"
    line: 1
    description: "Verbose error page exposes Go stack trace with internal file paths (/opt/techmart/), SQLite DB path, SQL query fragment showing injection, server version, PID, and uptime"
    type: "information-disclosure"
    verification: "Error page HTML contains stack trace, DB path /opt/techmart/data/techmart.db, SQL query with UNION syntax error, Go version, PID 1847"

  - id: "idor-user-profile"
    phase: "b"
    difficulty: "medium"
    file: "fixtures/api-docs/openapi.yaml"
    line: 1
    description: "GET /api/users/{id}/profile returns full profile (email, phone, address, date_of_birth, order_count, total_spent) for any user ID with only JWT auth check - no ownership verification"
    type: "broken-access-control"
    verification: "OpenAPI spec shows /users/{id}/profile requires only BearerAuth with no role/ownership check, returns UserProfile schema with PII"

  - id: "jwt-alg-none"
    phase: "b"
    difficulty: "hard"
    file: "fixtures/api-docs/openapi.yaml"
    line: 1
    description: "JWT authentication uses HS256 but may be vulnerable to alg:none attack if the server does not strictly validate the algorithm; JS bundle reveals jwt_decode client-side library"
    type: "authentication-bypass"
    verification: "OpenAPI spec mentions JWT HS256; JS bundle contains jwt_decode and alg/typ strings; standard test is to set alg to 'none' and strip signature"

  - id: "timing-user-enum"
    phase: "b"
    difficulty: "difficult"
    file: "fixtures/api-docs/openapi.yaml"
    line: 1
    description: "Password reset endpoint description says 'validates email exists before sending' but response says 'If the email exists' - server-side validation creates timing difference for user enumeration"
    type: "user-enumeration"
    verification: "OpenAPI description for /auth/reset-password contradicts: description says validates existence, response message attempts to be generic"

  # === Hidden CTFs ===

  - id: "ctf1-debug-header"
    phase: "b"
    difficulty: "hidden"
    file: "fixtures/ctf/response-with-debug-header.txt"
    line: 1
    description: "X-Debug-Token header contains FLAG{debug_token_d34db33f}; additional X-Debug-* headers leak handler name, DB query count, timing, user ID, and cache status"
    type: "ctf-flag"
    flag: "FLAG{debug_token_d34db33f}"
    technique: "HTTP header inspection"
    verification: "Grep for X-Debug-Token in response headers"

  - id: "ctf2-unicode-overflow"
    phase: "b"
    difficulty: "hidden"
    file: "fixtures/ctf/unicode-overflow-error.txt"
    line: 1
    description: "SQLite error response from unicode fuzzing contains FLAG{unicode_0verflow_sql1te} in the details.flag field; also leaks SQL query fragment and internal paths"
    type: "ctf-flag"
    flag: "FLAG{unicode_0verflow_sql1te}"
    technique: "Fuzzing and boundary testing"
    verification: "Grep for 'flag' key in JSON error response details object"

  - id: "ctf3-legacy-api"
    phase: "b"
    difficulty: "hidden"
    file: "fixtures/ctf/legacy-api-response.txt"
    line: 1
    description: "Undocumented /api/v2/ endpoint response contains FLAG{legacy_v2_endp01nt}; also reveals GraphQL introspection enabled, no rate limiting, and weak admin role checks"
    type: "ctf-flag"
    flag: "FLAG{legacy_v2_endp01nt}"
    technique: "API enumeration of disallowed paths"
    verification: "Grep for 'flag' key in /api/v2/ JSON response"

  - id: "ctf4-ssrf-avatar"
    phase: "b"
    difficulty: "hidden"
    file: "fixtures/ctf/avatar-upload-request.txt"
    line: 1
    description: "Avatar upload URL fetch does not validate target - fetches internal URLs (127.0.0.1) and cloud metadata (169.254.169.254); internal fetch response contains FLAG{ssrf_avatar_bypass}"
    type: "ctf-flag"
