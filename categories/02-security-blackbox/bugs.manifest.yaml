    technique: "SSRF identification via URL parameter"
    verification: "Internal URL fetch response contains flag field; cloud metadata fetch also succeeds"

  - id: "ctf5-websocket-metadata"
    phase: "b"
    difficulty: "hidden"
    file: "fixtures/ctf/websocket-handshake.txt"
    line: 1
    description: "WebSocket initial metadata message contains FLAG{ws_handshake_m3ta}; also leaks server version, Go version, active connections, DB path, memory usage, and goroutine count"
    type: "ctf-flag"
    flag: "FLAG{ws_handshake_m3ta}"
    technique: "WebSocket protocol inspection"
    verification: "Grep for 'flag' key in connection_established metadata JSON message"
