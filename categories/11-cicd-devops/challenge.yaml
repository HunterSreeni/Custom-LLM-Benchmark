      - id: "cat11c-hidden"
        difficulty: "hidden"
        title: "Dangerous Runbook Step"
        description: "Hidden bug - runbook has kubectl delete pods --all as a recovery step"
        prompt: |
          Review the following incident runbook (fixtures/phase-c/incident-runbook.md)
          for completeness and correctness. Identify any steps that could cause
          additional harm during an incident if followed as written.
        source_files:
          - "fixtures/phase-c/incident-runbook.md"
        expected_findings:
          - id: "dangerous-delete-all"
            description: "Step 2 in section 1 uses 'kubectl delete pods --all' which kills ALL pods simultaneously"
            required: true
