apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: production
  labels:
    app: nexus-api
    version: v2.4.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-api
  template:
    metadata:
      labels:
        app: nexus-api
        version: v2.4.1
    spec:
      containers:
        - name: nexus-api
          image: nexus-platform/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql://nexus:password123@db-prod:5432/nexus"
            - name: JWT_SECRET
              value: "my-jwt-secret-key-2024"
            - name: REDIS_URL
              value: "redis://redis-prod:6379"
          # No resource limits defined
          # No liveness or readiness probes
          # No security context
          # Running as root by default
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api-svc
  namespace: production
spec:
  selector:
    app: nexus-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-api-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.nexus-platform.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-api-svc
                port:
                  number: 80
