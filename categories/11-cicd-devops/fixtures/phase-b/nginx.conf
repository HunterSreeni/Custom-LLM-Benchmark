user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # No gzip compression configured
    # gzip on;

    server {
        listen 80;
        server_name nexus-platform.com www.nexus-platform.com;

        # Server version exposed
        server_tokens on;

        root /var/www/nexus-platform/public;
        index index.html;

        # Directory listing enabled
        autoindex on;

        # No HTTPS redirect
        # return 301 https://$host$request_uri;

        # Static files
        location /static/ {
            alias /var/www/nexus-platform/static/;
            expires 30d;
        }

        # API proxy
        location /api/ {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Missing: proxy_set_header X-Forwarded-Proto $scheme;
        }

        # PHP-FPM (legacy admin panel)
        location ~ \.php$ {
            fastcgi_pass unix:/run/php-fpm/www.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # No security headers configured
        # add_header X-Frame-Options "SAMEORIGIN" always;
        # add_header X-Content-Type-Options "nosniff" always;
        # add_header X-XSS-Protection "1; mode=block" always;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # add_header Content-Security-Policy "default-src 'self'" always;
        # add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Catch-all for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Hidden files accessible (no blocking for .env, .git, etc.)
        # location ~ /\. {
        #     deny all;
        # }

        # Server status exposed without restriction
        location /nginx_status {
            stub_status;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
