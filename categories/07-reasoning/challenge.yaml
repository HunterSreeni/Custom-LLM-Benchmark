      - id: "cat7c-hard"
        difficulty: "hard"
        title: "Multi-Source Log Correlation"
        description: "Correlate Nginx access logs, application server logs, and DB slow query logs by request ID to build request timelines."
        prompt: |
          Below are logs from 3 different sources for the same application:
          1. Nginx access log (request received and response sent)
          2. Application server log (request processing, DB queries)
          3. PostgreSQL slow query log (query execution details)

          All sources share a common request ID field (X-Request-ID pattern like X-a1b2c3).

          For each unique request ID:
          1. Build a complete timeline showing when each event occurred
          2. Calculate the total end-to-end latency
          3. Identify where time was spent (network, application logic, database)
          4. Flag any anomalies (slow queries, errors, deadlocks)

          Present the results as a structured timeline for each request.
        source_files:
          - "fixtures/phase-c/multi-source-logs.txt"
        expected_findings:
          - id: "correlates-by-request-id"
            description: "Successfully correlates events across all 3 log sources using request IDs"
            required: true
            points: 3
          - id: "builds-timelines"
            description: "Builds accurate timelines for each request"
            required: true
            points: 3
          - id: "identifies-anomalies"
            description: "Flags the deadlock (X-g7h8i9), slow query (SKU-999), and payment timeout (X-s9t0u1)"
            required: true
            points: 4
        scoring_rubric:
          max_base_score: 10
          criteria:
            - name: "Correlates across log sources"
              points: 3
              match_type: "keyword"
              match_terms: ["X-a1b2c3", "X-g7h8i9", "request ID", "correlate"]
            - name: "Accurate timelines"
              points: 3
              match_type: "keyword"
              match_terms: ["timeline", "nginx", "app server", "database"]
            - name: "Identifies deadlock"
              points: 2
              match_type: "keyword"
              match_terms: ["deadlock", "X-g7h8i9", "SKU-999", "4005ms"]
            - name: "Identifies payment timeout"
              points: 2
              match_type: "keyword"
              match_terms: ["timeout", "X-s9t0u1", "30s", "payment"]
        penalty_checks:
          - flag: "-H"
            condition: "Fabricates events not present in the logs"
          - flag: "-I"
            condition: "Fails to use request IDs for correlation"

      - id: "cat7c-difficult"
        difficulty: "difficult"
        title: "IOC Extraction from Incident Report"
        description: "Extract all indicators of compromise (IPs, domains, hashes, emails, file paths) from a prose incident report."
        prompt: |
          The following is a raw incident report describing a security breach.
          Extract ALL indicators of compromise (IOCs) mentioned in the report and
          categorize them.

          Output a structured IOC list with the following categories:
          1. IP Addresses (with context - C2, phishing, internal, etc.)
          2. Domains (with context)
          3. File Hashes (MD5 and SHA256, with associated filename)
          4. Email Addresses (with context)
          5. File Paths (with context)
          6. Network Indicators (ports, protocols)
          7. Persistence Mechanisms (registry keys, scheduled tasks)

          For each IOC, note whether it is malicious, suspicious, or legitimate/internal.
          Do NOT miss any IOCs - completeness is critical for incident response.
        source_files:
          - "fixtures/phase-c/incident-report.txt"
        expected_findings:
          - id: "extracts-ips"
            description: "Extracts all IP addresses (45.33.32.156, 185.220.101.34, 91.219.237.229, 23.106.122.100, etc.)"
            required: true
            points: 3
          - id: "extracts-domains"
            description: "Extracts all domains (acme-benefits-portal.com, data-analytics-cdn.net, acme-corp-sso.com)"
            required: true
            points: 2
          - id: "extracts-hashes"
            description: "Extracts all file hashes (SHA256 and MD5) with associated filenames"
            required: true
            points: 2
          - id: "extracts-file-paths"
            description: "Extracts all file paths (C:\\Users\\mstevens\\Downloads\\..., C:\\ProgramData\\...)"
            required: true
            points: 1
          - id: "categorizes-correctly"
            description: "Correctly categorizes IOCs as malicious, suspicious, or legitimate"
            required: false
            points: 2
        scoring_rubric:
          max_base_score: 10
          criteria:
            - name: "Extracts all IP addresses"
              points: 3
              match_type: "keyword"
              match_terms: ["45.33.32.156", "91.219.237.229", "185.220.101.34", "23.106.122.100"]
            - name: "Extracts all domains"
              points: 2
              match_type: "keyword"
              match_terms: ["acme-benefits-portal", "data-analytics-cdn", "acme-corp-sso"]
            - name: "Extracts file hashes"
              points: 2
              match_type: "keyword"
              match_terms: ["e3b0c44298fc1c149", "d41d8cd98f00b204", "SHA256"]
            - name: "Categorizes IOCs correctly"
              points: 3
              match_type: "keyword"
              match_terms: ["malicious", "C2", "phishing", "legitimate"]
        penalty_checks:
          - flag: "-H"
            condition: "Fabricates IOCs not present in the report"
          - flag: "-I"
            condition: "Misses more than 3 IOCs from the report"

      - id: "cat7c-hidden"
        difficulty: "hidden"
        title: "Regex DoS Awareness"
        description: "Write an email validation regex that is safe from catastrophic backtracking on pathological inputs."
        prompt: |
          Write a regex pattern to validate email addresses. The pattern must:
          1. Match standard email formats (local@domain.tld)
          2. Support dots, hyphens, underscores, and plus signs in the local part
          3. Require at least one dot in the domain
          4. Domain labels must start and end with alphanumeric characters

          Test your regex against ALL inputs in the test file, including the "Pathological inputs" section.
          Your regex must complete validation in reasonable time (under 100ms) for ALL inputs.

          Explain any ReDoS (Regular Expression Denial of Service) considerations in your design.
        source_files:
          - "fixtures/phase-c/regex-dos-input.txt"
        expected_findings:
          - id: "safe-regex"
            description: "Writes a regex without nested quantifiers that runs in linear time"
            required: true
            points: 5
          - id: "explains-redos"
            description: "Explains catastrophic backtracking and why nested quantifiers are dangerous"
            required: true
            points: 3
          - id: "handles-pathological"
            description: "Explicitly addresses the pathological inputs and confirms safe behavior"
            required: true
            points: 2
        scoring_rubric:
          max_base_score: 10
          criteria:
            - name: "Regex is syntactically correct and matches valid emails"
              points: 3
              match_type: "keyword"
              match_terms: ["@", "\\.", "regex", "pattern"]
            - name: "No nested quantifiers"
              points: 3
              match_type: "keyword"
              match_terms: ["no nested", "linear", "safe", "backtracking"]
            - name: "Explains ReDoS risk"
              points: 2
              match_type: "keyword"
              match_terms: ["ReDoS", "catastrophic backtracking", "exponential", "denial of service"]
            - name: "Tests against pathological inputs"
              points: 2
              match_type: "keyword"
              match_terms: ["pathological", "aaaa", "safe", "linear time"]
        penalty_checks:
          - flag: "-H"
            condition: "Writes a regex with nested quantifiers that is vulnerable to ReDoS"
          - flag: "-I"
            condition: "Ignores the pathological inputs section entirely"
