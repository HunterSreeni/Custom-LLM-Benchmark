  severity: high
  title: golang.org/x/ packages using 2022 pseudo-versions with multiple CVEs
  description: 'The go.mod file pins three golang.org/x/ packages to early 2022 pseudo-versions:

    1. golang.org/x/crypto v0.0.0-20220314 - Multiple CVEs including SSH issues

    2. golang.org/x/net v0.0.0-20220225 - HTTP/2 DoS vulnerabilities

