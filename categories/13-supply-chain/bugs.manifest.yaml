- id: bug-8
  challenge_id: cat13b-hard
  difficulty: hard
  phase: b
  type: CI Pipeline Supply Chain Risks
  severity: critical
  title: Multiple supply chain attack vectors in CI/CD pipeline
  description: 'The CI pipeline has several supply chain security issues:

    1. Uses npm install instead of npm ci (non-deterministic, ignores lockfile)

    2. Pipes curl output to bash from untrusted URLs (setup.sh, deploy tools)

    3. Uses npm install with --ignore-scripts=false explicitly

    4. pip install with --no-verify flag

    5. GitHub Actions pinned to mutable tags (v3, v4) instead of SHA hashes

    6. Secrets potentially exposed in deploy steps

    '
  fix: Use npm ci, pin actions to SHA, verify checksums, avoid curl|bash, use --ignore-scripts
    for npm, remove --no-verify from pip
  verification: Review each step for dependency installation method and script execution
    patterns
  file: fixtures/ci-pipeline.yaml
  line: 1
- id: bug-9
