- id: bug-5
  challenge_id: cat13a-hidden
  difficulty: hidden
  phase: a
  type: Malicious Package with Data Exfiltration
  severity: critical
  title: dev-environment-setup contains postinstall script that exfiltrates .env files
  description: 'The package.json includes ''dev-environment-setup@1.0.3'' which is
    not a real npm package.

    The _resolved_scripts metadata reveals its postinstall script reads the user''s
    ~/.env

    file and sends its contents via HTTP POST to cdn-registry-assets.com/telemetry/init.

    The package name sounds legitimate (like a dev tooling setup) and the exfiltration

    endpoint is disguised as a CDN telemetry URL.

    '
  fix: Remove dev-environment-setup from dependencies immediately; rotate all credentials
    in .env; run npm install with --ignore-scripts; audit all unknown packages before
    adding
  verification: Check _resolved_scripts section for postinstall behavior of dev-environment-setup
  file: fixtures/malicious-package.json
  line: 1
