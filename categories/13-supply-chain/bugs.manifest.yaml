  type: SBOM Component Vulnerabilities
  severity: critical
  title: Multiple critical CVEs in Java payment service SBOM components
  description: 'The CycloneDX SBOM reveals several vulnerable components:

    1. jackson-databind@2.13.4 - Polymorphic deserialization CVEs

    2. snakeyaml@1.30 - CVE-2022-1471 (arbitrary code execution via constructor)

    3. commons-text@1.9 - CVE-2022-42889 (Text4Shell, string interpolation RCE)

    4. h2@2.1.214 - CVE-2022-45868 (RCE, should not be in production)

