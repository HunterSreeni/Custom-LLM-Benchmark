- id: bug-3
  challenge_id: cat13a-hard
  difficulty: hard
  phase: a
  type: Lockfile Version Drift
  severity: medium
  title: Lockfile pins express@4.18.2 which has known CVE despite range allowing update
  description: 'The package.json specifies "express": "^4.18.0" which would allow
    4.18.3+.

    However, the lockfile pins express@4.18.2 which has known vulnerabilities

    (path traversal via serve-static dependency). Running npm ci would install

    the vulnerable pinned version. Running npm install might update it.

    '
  fix: Run npm audit fix to update lockfile, or manually update express resolution;
    always use npm ci in CI/CD and regenerate lockfile periodically
  verification: Compare resolved versions in lockfile against CVE databases
  file: fixtures/drifted-package.json
  line: 1
