- id: bug-10
  challenge_id: cat13b-hidden
  difficulty: hidden
  phase: b
  type: Supply Chain Attack via npm Account Takeover
  severity: critical
  title: Supply chain attack through compromised npm maintainer account, not insider
    threat
  description: 'The incident was a supply chain attack, not an insider threat:

    1. The colors package maintainer''s npm account was compromised (login from new
    IP)

    2. The maintainer did not have 2FA enabled on their npm account

    3. A malicious version 1.4.2 was published by the attacker

    4. The CI pipeline used npm install (not npm ci), pulling the new version automatically

    5. Dev-C is a red herring - they did not commit the change, the CI bot did

    6. The lockfile change was automated, not manual

    Key missing controls: npm 2FA for maintainers, lockfile pinning, npm audit in
    CI,

    using npm ci instead of npm install, postinstall script review.

    '
  fix: Rotate all exfiltrated credentials, pin lockfile versions, use npm ci in CI,
    require 2FA for package publishing, add npm audit to CI pipeline, review postinstall
    scripts
  verification: 'Cross-reference timeline evidence: maintainer account compromise
    -> malicious publish -> automated CI pickup'
  file: fixtures/supply-chain-incident.md
  line: 1
